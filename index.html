<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PawCards" />
  <meta name="theme-color" content="#1a1a1a" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/pawcards-icon.png" />
  <link rel="icon" type="image/svg+xml" href="/pawcards-icon.svg" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <title>PawCards — draw · organize · remember</title>
  <script>
    try { document.documentElement.dataset.theme = localStorage.getItem('paw-theme') || 'ink' } catch (e) { document.documentElement.dataset.theme = 'ink' }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <!-- Cloudflare Web Analytics — cookieless, privacy-first page visits (no consent
       banner needed). Get your token: Cloudflare dashboard → Web Analytics → Add a
       site → copy the token, then replace __CF_BEACON_TOKEN__ below (same in
       public/about.html). The token is public — safe to commit. It stays inert
       until the token is set, so dev/tests never hit the network. -->
  <script>
    (function () {
      var t = "ea927002895145228d9b8f863cd22873";
      if (t.slice(0, 2) === "__") return; // token not set yet — don't load the beacon
      var s = document.createElement("script");
      s.defer = true;
      s.src = "https://static.cloudflareinsights.com/beacon.min.js";
      s.setAttribute("data-cf-beacon", JSON.stringify({ token: t }));
      document.head.appendChild(s);
    })();
  </script>
</body>
</html>
