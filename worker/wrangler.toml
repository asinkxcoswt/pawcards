# ⚠ REFERENCE ONLY — the recommended way to deploy is the local script:
#
#     bunx wrangler login     (once)
#     bun worker/deploy.ts    [name] [--rotate-key]
#
# It provisions the whole stack (KV namespace, Durable Object, SECRET) and
# writes its own generated config (worker/.wrangler.<name>.json, gitignored).
# This file remains only as documentation of what that config contains.

name = "pawcards-polish"
main = "pawcards-worker.js"
compatibility_date = "2026-07-01"

[ai]
binding = "AI"

# --- Cloud sync storage (KV) ---
# One-time setup:
#   1. Run:  npx wrangler kv namespace create SYNC
#   2. Copy the printed id into the block below and remove the leading # marks
#   3. Deploy again:  npx wrangler deploy
# (Dashboard route: Storage & Databases → KV → Create namespace,
#  then Worker → Settings → Bindings → KV namespace, variable name SYNC)
#
# [[kv_namespaces]]
# binding = "SYNC"
# id = "PASTE_NAMESPACE_ID_HERE"

# --- Rooms (Durable Object) ---
# REQUIRED for the rooms feature: one PawRoom object per room holds the live
# state (presence, shared-deck list) and pushes updates over WebSockets.
# SQLite-backed Durable Objects are included in the FREE Workers plan.
# Nothing to create in the dashboard — deploying with these blocks is enough.

[[durable_objects.bindings]]
name = "ROOM"
class_name = "PawRoom"

[[migrations]]
tag = "v1-rooms"
new_sqlite_classes = ["PawRoom"]
